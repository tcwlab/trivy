# ─────────────────────────────────────────────────────────────────────────────
# chameleon-ci / trivy — Build & Publish
#
# Kein einziger Inline-Download. Alle Tools sind in spezialisierten,
# versionierten Images vorinstalliert:
#   tcwlab/betterlint:latest → Dockerfile-Linting
#   tcwlab/buildx:0.33.0    → docker build / buildx (amd64 + arm64)
#
# Checkout: Shell-basiert (git init + git fetch) — kein Node.js nötig.
# Docker-Daemon: Direkt über tcp://docker-in-docker:2375 (runner-net).
#
# Versionierung: Semantic Release (v*.*.*) via release.yml
#   → tcwlab/trivy:<tool-version>-<semver>  immutable  (z.B. 0.70.0-1.2.3)
#   → tcwlab/trivy:<tool-version>            float      (z.B. 0.70.0)
#   → tcwlab/trivy:latest                    float
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main, "feature/*", "claude/*"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: tcwlab/trivy
  DOCKER_BUILDKIT: "1"

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:latest
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@git.mon.k8b.co/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Run betterlint
        run: |
          set +e
          betterlint --dir . --markdown 2>&1 | tee /tmp/betterlint-report.md
          LINT_EXIT="${PIPESTATUS[0]}"
          exit "${LINT_EXIT}"

      - name: Betterlint-Ergebnis als PR-Kommentar
        if: always()
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO: ${{ github.repository }}
          IMAGE_REF: "tcwlab/betterlint:latest"
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, urllib.error
          from datetime import datetime, timezone

          MARKER  = "<!-- betterlint-report -->"
          token   = os.environ["FORGEJO_TOKEN"]
          repo    = os.environ["REPO"]
          event   = os.environ["GITHUB_EVENT_NAME"]
          api     = "https://git.mon.k8b.co/api/v1"
          hdrs    = {"Authorization": f"token {token}", "Content-Type": "application/json"}

          def get(url):
              req = urllib.request.Request(url, headers=hdrs)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def post(url, body):
              req = urllib.request.Request(
                  url, data=json.dumps(body).encode(), headers=hdrs, method="POST")
              with urllib.request.urlopen(req) as r:
                  return r.status

          def patch(url, body):
              req = urllib.request.Request(
                  url, data=json.dumps(body).encode(), headers=hdrs, method="PATCH")
              with urllib.request.urlopen(req) as r:
                  return r.status

          pr_number = None
          if event == "pull_request":
              pr_number = os.environ["PR_NUMBER"]
          else:
              branch = os.environ["HEAD_BRANCH"]
              try:
                  for pr in get(f"{api}/repos/{repo}/pulls?state=open&limit=50"):
                      if pr.get("head", {}).get("ref") == branch:
                          pr_number = str(pr["number"])
                          break
              except urllib.error.URLError as e:
                  print(f"PR-Suche fehlgeschlagen: {e}")

          if not pr_number:
              print("Kein offener PR — Kommentar wird nicht gepostet")
              raise SystemExit(0)

          try:
              with open("/tmp/betterlint-report.md") as f:
                  report = f.read().strip()
          except FileNotFoundError:
              report = "**⚠️ betterlint-Report nicht gefunden**"

          scan_date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          comment   = f"{MARKER}\n{report}\n\n_Scan: `{os.environ['IMAGE_REF']}` — {scan_date}_"

          existing_id = None
          page = 1
          while True:
              comments = get(f"{api}/repos/{repo}/issues/{pr_number}/comments?limit=50&page={page}")
              if not comments:
                  break
              for c in comments:
                  if MARKER in (c.get("body") or ""):
                      existing_id = c["id"]
                      break
              if existing_id or len(comments) < 50:
                  break
              page += 1

          if existing_id:
              status = patch(f"{api}/repos/{repo}/issues/comments/{existing_id}", {"body": comment})
              print(f"PR #{pr_number}: Betterlint-Kommentar aktualisiert (HTTP {status})")
          else:
              status = post(f"{api}/repos/{repo}/issues/{pr_number}/comments", {"body": comment})
              print(f"PR #{pr_number}: Betterlint-Kommentar erstellt (HTTP {status})")
          EOF
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Smoke-Test (amd64)
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/buildx:0.33.0
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@git.mon.k8b.co/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Build (amd64)
        run: docker build -t "${{ env.IMAGE }}:test" .

      - name: Smoke-Test
        run: docker run --rm "${{ env.IMAGE }}:test" --version

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push zu Staging
        run: |
          TOOL=$(echo "${{ env.IMAGE }}" | cut -d'/' -f2)
          docker tag "${{ env.IMAGE }}:test" "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"
          docker push "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"

  # ---------------------------------------------------------------------------
  security:
    name: Trivy Security Scan
    runs-on: ubuntu-22.04
    needs: [build-test]
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - name: Install Docker CLI
        run: |
          curl -fsSL \
            "https://download.docker.com/linux/static/stable/x86_64/docker-29.4.2.tgz" \
            -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker

      - name: Trivy Scan (JSON)
        run: |
          TOOL=$(echo "${{ env.IMAGE }}" | cut -d'/' -f2)
          docker run --rm \
            -e TRIVY_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" \
            -e TRIVY_PASSWORD="${{ secrets.DOCKERHUB_TOKEN }}" \
            tcwlab/trivy:0.70.0 image \
            --exit-code 0 --severity HIGH,CRITICAL --ignore-unfixed \
            --format json \
            "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}" \
            > /tmp/trivy-report.json

      - name: Trivy-Ergebnis als PR-Kommentar
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO: ${{ github.repository }}
          SCANNED_IMAGE: "tcwlab/forgejo-build:trivy-${{ github.sha }}"
          TRIVY_IMAGE: "tcwlab/trivy:0.70.0"
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, urllib.error
          from datetime import datetime, timezone

          MARKER  = "<!-- trivy-report -->"
          token   = os.environ["FORGEJO_TOKEN"]
          repo    = os.environ["REPO"]
          event   = os.environ["GITHUB_EVENT_NAME"]
          api     = "https://git.mon.k8b.co/api/v1"
          hdrs    = {"Authorization": f"token {token}", "Content-Type": "application/json"}

          def get(url):
              req = urllib.request.Request(url, headers=hdrs)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def post(url, body):
              req = urllib.request.Request(
                  url, data=json.dumps(body).encode(), headers=hdrs, method="POST")
              with urllib.request.urlopen(req) as r:
                  return r.status

          def patch(url, body):
              req = urllib.request.Request(
                  url, data=json.dumps(body).encode(), headers=hdrs, method="PATCH")
              with urllib.request.urlopen(req) as r:
                  return r.status

          # PR-Nummer ermitteln
          pr_number = None
          if event == "pull_request":
              pr_number = os.environ["PR_NUMBER"]
          else:
              branch = os.environ["HEAD_BRANCH"]
              try:
                  for pr in get(f"{api}/repos/{repo}/pulls?state=open&limit=50"):
                      if pr.get("head", {}).get("ref") == branch:
                          pr_number = str(pr["number"])
                          break
              except urllib.error.URLError as e:
                  print(f"PR-Suche fehlgeschlagen: {e}")

          if not pr_number:
              print("Kein offener PR — Kommentar wird nicht gepostet")
              raise SystemExit(0)

          # Report aufbauen
          with open("/tmp/trivy-report.json") as f:
              report = json.load(f)

          icon = {"CRITICAL": "🔴", "HIGH": "🟠"}
          rows = []
          for result in report.get("Results", []):
              for v in result.get("Vulnerabilities") or []:
                  sev   = v.get("Severity", "")
                  pkg   = v.get("PkgName", "")
                  inst  = v.get("InstalledVersion", "")
                  fixed = v.get("FixedVersion", "") or "—"
                  cve   = v.get("VulnerabilityID", "")
                  url   = next(
                      (r for r in v.get("References", []) if "nvd.nist.gov" in r),
                      v.get("PrimaryURL", ""))
                  cve_link = f"[{cve}]({url})" if url else cve
                  rows.append((sev, icon.get(sev, "⚪"), pkg, inst, fixed, cve_link))

          rows.sort(key=lambda r: ({"CRITICAL": 0, "HIGH": 1}.get(r[0], 9), r[2]))
          counts = {s: sum(1 for r in rows if r[0] == s) for s in ["CRITICAL", "HIGH"]}
          total  = sum(counts.values())

          if total == 0:
              body = "**✅ Security Scan — keine HIGH/CRITICAL Schwachstellen**"
          else:
              parts = [f"{counts[s]} {s}" for s in ["CRITICAL", "HIGH"] if counts[s]]
              body  = f"**⚠️ Security Scan — {', '.join(parts)}** (nur behebbare Schwachstellen)\n\n"
              body += "| Severity | Package | Installed | Fixed | CVE |\n"
              body += "| --- | --- | --- | --- | --- |\n"
              for _, ico, pkg, inst, fixed, cve_link in rows:
                  body += f"| {ico} | `{pkg}` | {inst} | {fixed} | {cve_link} |\n"

          scan_date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          comment   = (
              f"{MARKER}\n{body}\n\n"
              f"_Gescannt: `{os.environ['SCANNED_IMAGE']}` "
              f"· Tool: `{os.environ['TRIVY_IMAGE']}` "
              f"· {scan_date}_"
          )

          # Vorhandenen Kommentar suchen (seitenweise, max 200)
          existing_id = None
          page = 1
          while True:
              comments = get(f"{api}/repos/{repo}/issues/{pr_number}/comments?limit=50&page={page}")
              if not comments:
                  break
              for c in comments:
                  if MARKER in (c.get("body") or ""):
                      existing_id = c["id"]
                      break
              if existing_id or len(comments) < 50:
                  break
              page += 1

          if existing_id:
              status = patch(f"{api}/repos/{repo}/issues/comments/{existing_id}", {"body": comment})
              print(f"PR #{pr_number}: Trivy-Kommentar aktualisiert (HTTP {status})")
          else:
              status = post(f"{api}/repos/{repo}/issues/{pr_number}/comments", {"body": comment})
              print(f"PR #{pr_number}: Trivy-Kommentar erstellt (HTTP {status})")
          EOF

  # ---------------------------------------------------------------------------
  publish:
    name: Publish to Docker Hub (linux/amd64 + linux/arm64)
    runs-on: ubuntu-22.04
    needs: [lint, security]
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: tcwlab/buildx:0.33.0
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@git.mon.k8b.co/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Extract versions from tag
        id: version
        run: |
          SEMVER="${GITHUB_REF#refs/tags/v}"
          TOOL_VER=$(grep '^ARG TRIVY_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          echo "semver=${SEMVER}"         >> "$GITHUB_OUTPUT"
          echo "tool_version=${TOOL_VER}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Set up Buildx builder
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push (multi-arch)
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"
          TOOL_VER="${{ steps.version.outputs.tool_version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --sbom=true \
            --provenance=mode=max \
            --build-arg TRIVY_VERSION="${TOOL_VER}" \
            -t "${{ env.IMAGE }}:${TOOL_VER}-${SEMVER}" \
            -t "${{ env.IMAGE }}:${TOOL_VER}" \
            -t "${{ env.IMAGE }}:latest" \
            --push \
            .
