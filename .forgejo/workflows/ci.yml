# ─────────────────────────────────────────────────────────────────────────────
# chameleon-ci / trivy — Build & Publish
#
# Kein einziger Inline-Download in lint/build-test. Tools sind in
# versionierten Images vorinstalliert:
#   tcwlab/hadolint:2.12.0  → Dockerfile-Linting
#   tcwlab/buildx:0.33.0    → docker build (amd64 Smoke-Test)
#
# Release-Job: ubuntu-22.04, Docker CLI + buildx inline, DinD via runner-net.
# Versionierung: <tool-version>-<sha8>  (z.B. 0.62.0-f83dc49e)
#   → tcwlab/trivy:<version>-<sha8>  immutable
#   → tcwlab/trivy:<version>          float
#   → tcwlab/trivy:latest             float
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: tcwlab/trivy
  DOCKER_BUILDKIT: "1"

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Dockerfile Lint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/hadolint:2.12.0
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@git.mon.k8b.co/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: hadolint
        run: hadolint --ignore DL3018 Dockerfile

  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Smoke-Test (amd64)
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/buildx:0.33.0
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@git.mon.k8b.co/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Build (amd64)
        run: docker build -t "${{ env.IMAGE }}:test" .

      - name: Smoke-Test
        run: docker run --rm "${{ env.IMAGE }}:test" --version

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push to staging
        run: |
          TOOL=$(echo "${{ env.IMAGE }}" | cut -d'/' -f2)
          docker tag "${{ env.IMAGE }}:test" "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"
          docker push "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"

      - name: Trivy Scan
        run: |
          TOOL=$(echo "${{ env.IMAGE }}" | cut -d'/' -f2)
          docker run --rm \
            -e TRIVY_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" \
            -e TRIVY_PASSWORD="${{ secrets.DOCKERHUB_TOKEN }}" \
            tcwlab/trivy:0.70.0 image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"

  # ---------------------------------------------------------------------------
  release:
    name: Release — Multi-Arch Push + Git-Tag
    runs-on: ubuntu-22.04
    needs: [lint, build-test]
    if: github.ref == 'refs/heads/main'
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@git.mon.k8b.co/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Extract version
        id: version
        run: |
          VER=$(grep '^ARG TRIVY_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          SHA8="${GITHUB_SHA:0:8}"
          echo "tool_version=${VER}" >> "$GITHUB_OUTPUT"
          echo "sha8=${SHA8}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${{ env.IMAGE }}:${VER}-${SHA8}"

      - name: Install Docker CLI + buildx
        run: |
          curl -fsSL "https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL "https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64" -o ~/.docker/cli-plugins/docker-buildx
          chmod +x ~/.docker/cli-plugins/docker-buildx
          docker buildx version

      - name: Set up QEMU (arm64 emulation)
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Set up Buildx builder
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push (multi-arch)
        run: |
          VER="${{ steps.version.outputs.tool_version }}"
          SHA8="${{ steps.version.outputs.sha8 }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --sbom=true \
            --provenance=mode=max \
            --build-arg TRIVY_VERSION="${VER}" \
            -t "${{ env.IMAGE }}:${VER}-${SHA8}" \
            -t "${{ env.IMAGE }}:${VER}" \
            -t "${{ env.IMAGE }}:latest" \
            --push \
            .

      - name: Create Git-Tag
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.tool_version }}"
          SHA8="${{ steps.version.outputs.sha8 }}"
          TAG="v${VER}-${SHA8}"
          PAYLOAD=$(printf '{"tag_name":"%s","target":"%s"}' "${TAG}" "${GITHUB_SHA}")
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "https://git.mon.k8b.co/api/v1/repos/${GITHUB_REPOSITORY}/tags")
          echo "Git-Tag ${TAG} -> HTTP ${HTTP}"
